context:
  version: "1.7.2"

package:
  name: tealdeer
  version: ${{ version }}

source:
  url: https://github.com/dbrgn/tealdeer/archive/v${{ version }}.tar.gz
  sha256: d0675b9aa48c00e78abafc318b9bfbcb7ea3cce63e58a42c1f9e2395abcfe0e8

build:
  number: 0
  skip: ppc64le

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - tldr --help

about:
  license: Apache-2.0
  license_file:
    - LICENSE-APACHE
    - THIRDPARTY.yml
  summary: Very fast implementation of tldr in Rust
  homepage: https://github.com/dbrgn/tealdeer
  repository: https://github.com/dbrgn/tealdeer

extra:
  recipe-maintainers:
    - danielnachun
